<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBLOX GIVEAWAY</title>
    <!-- 基礎庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (使用穩定相容版) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #050508; 
            color: #e2e8f0; 
            margin: 0;
            overflow-x: hidden;
        }
        .font-tech { font-family: 'Orbitron', sans-serif; }
        .glass-panel {
            background: rgba(15, 15, 25, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
        }
        .box-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .box-card.active {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        input[type="password"] { -webkit-text-security: disc; }
        .gradient-text {
            background: linear-gradient(90deg, #fff, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyAdK4WJIc2aK2YUdybq9_xBiDPFSghM76Y",
            authDomain: "hacqr-lottery.firebaseapp.com",
            projectId: "hacqr-lottery",
            storageBucket: "hacqr-lottery.firebasestorage.app",
            messagingSenderId: "742307339513",
            appId: "1:742307339513:web:35a5206e8cf4034d95d628",
            measurementId: "G-JR7MK8FSFP"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = "roblox-draw-secure";

        const { useState, useEffect } = React;

        const BoxIcon = () => (
            <svg className="w-8 h-8 mb-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                <path d="M21 8.25L12 13L3 8.25M21 8.25L12 3.5L3 8.25M21 8.25V15.75L12 20.5L3 15.75V8.25" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
        );

        function App() {
            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [participants, setParticipants] = useState([]);
            const [robloxId, setRobloxId] = useState('');
            const [memberId, setMemberId] = useState('');
            const [selectedBox, setSelectedBox] = useState('皮膚箱 2');
            const [adminPassword, setAdminPassword] = useState('');
            const [drawCount, setDrawCount] = useState(1);
            const [winners, setWinners] = useState([]);
            const [message, setMessage] = useState({ type: '', text: '' });
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                auth.signInAnonymously().catch(console.error);
                return auth.onAuthStateChanged(u => setUser(u));
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/public/data/participants`;
                return db.collection(path).onSnapshot(snap => {
                    setParticipants(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, [user]);

            const showStatus = (type, text) => {
                setMessage({ type, text });
                setTimeout(() => setMessage({ type: '', text: '' }), 4000);
            };

            const verifyKey = async (input, type) => {
                if (!input.trim() || !user) return false;
                try {
                    const keyPath = `artifacts/${appId}/public/data/vault/${type}/keys/${input.trim()}`;
                    const doc = await db.doc(keyPath).get();
                    return doc.exists;
                } catch (e) { return false; }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!user || !robloxId.trim() || loading) return;
                setLoading(true);
                try {
                    let isVip = false;
                    if (memberId.trim()) {
                        if (await verifyKey(memberId, 'vip')) isVip = true;
                        else throw new Error("會員驗證失敗，請檢查 ID");
                    }
                    if (participants.some(p => p.robloxId?.toLowerCase() === robloxId.trim().toLowerCase())) throw new Error("此帳號已經報名過囉！");

                    const colPath = `artifacts/${appId}/public/data/participants`;
                    if (isVip) {
                        const batch = db.batch();
                        for (let i = 0; i < 20; i++) {
                            const ref = db.collection(colPath).doc();
                            batch.set(ref, { robloxId: robloxId.trim(), box: selectedBox, s: true, t: Date.now() });
                        }
                        await batch.commit();
                        showStatus('success', 'VIP 權限啟動：20倍中獎機率已注入');
                    } else {
                        await db.collection(colPath).add({ robloxId: robloxId.trim(), box: selectedBox, s: false, t: Date.now() });
                        showStatus('success', '提交成功，祝您幸運中獎！');
                    }
                    setRobloxId(''); setMemberId('');
                } catch (err) { showStatus('error', err.message); }
                finally { setLoading(false); }
            };

            const handleAdminLogin = async () => {
                if (await verifyKey(adminPassword, 'admin')) {
                    setIsAdmin(true); setAdminPassword(''); showStatus('success', '管理控制台已開啟');
                } else { showStatus('error', '安全碼錯誤'); }
            };

            return (
                <div className="min-h-screen p-6 md:p-12 max-w-7xl mx-auto flex flex-col">
                    <header className="flex justify-between items-center mb-16">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(37,99,235,0.4)]">
                                <svg className="text-white w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                                    <path d="M8 21h8m-4-4v4M5 3h14a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z" />
                                </svg>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black font-tech italic tracking-tight text-white leading-none">ROBLOX GIVEAWAY</h1>
                                <p className="text-[9px] font-bold text-blue-500 tracking-[0.4em] uppercase opacity-70 mt-1">Cloud Database Synchronized</p>
                            </div>
                        </div>
                        <button onClick={() => isAdmin && setIsAdmin(false)} className="px-6 py-2 rounded-xl border border-white/5 bg-white/5 text-[10px] font-black tracking-widest text-slate-500 hover:text-white transition-all uppercase">
                            {isAdmin ? 'Exit Terminal' : 'Admin Portal'}
                        </button>
                    </header>

                    {message.text && (
                        <div className={`fixed top-10 left-1/2 -translate-x-1/2 z-[100] px-10 py-5 rounded-2xl shadow-2xl backdrop-blur-xl border border-white/10 animate-in fade-in slide-in-from-top-10 ${message.type === 'success' ? 'bg-blue-600/90' : 'bg-rose-600/90'} text-white font-bold flex items-center gap-3`}>
                            <span className="text-xl">{message.type === 'success' ? '✓' : '✕'}</span>
                            {message.text}
                        </div>
                    )}

                    <main className="flex-1">
                        {!isAdmin ? (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-12">
                                <div className="lg:col-span-7 glass-panel p-10 md:p-14 shadow-2xl">
                                    <h2 className="text-4xl font-black italic text-white mb-12 tracking-tight">參加抽獎活動</h2>
                                    <form onSubmit={handleSubmit} className="space-y-10">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <div className="space-y-3">
                                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Roblox Username</label>
                                                <input type="text" value={robloxId} onChange={e => setRobloxId(e.target.value)} placeholder="您的帳號名稱" className="w-full bg-black/40 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-blue-600 font-bold transition-all" required />
                                            </div>
                                            <div className="space-y-3">
                                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Member ID (Optional)</label>
                                                <input type="text" value={memberId} onChange={e => setMemberId(e.target.value)} placeholder="VIP 驗證碼" className="w-full bg-black/40 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-blue-600 font-bold transition-all" />
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-3 gap-4">
                                            {['皮膚箱 1', '皮膚箱 2', '皮膚箱 3'].map(box => (
                                                <button key={box} type="button" onClick={() => setSelectedBox(box)} className={`box-card p-6 rounded-3xl flex flex-col items-center justify-center transition-all ${selectedBox === box ? 'active' : 'opacity-40 hover:opacity-100'}`}>
                                                    <BoxIcon />
                                                    <span className="text-[10px] font-bold uppercase tracking-widest mt-2">{box}</span>
                                                </button>
                                            ))}
                                        </div>

                                        <button disabled={loading} className="w-full bg-blue-600 hover:bg-blue-500 py-8 rounded-[2rem] font-black text-white text-xl shadow-2xl shadow-blue-900/30 active:scale-95 transition-all flex justify-center items-center gap-4">
                                            <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                                            {loading ? '正在同步加密...' : '立即提交名單'}
                                        </button>
                                    </form>
                                </div>

                                <div className="lg:col-span-5 flex flex-col gap-8">
                                    <div className="glass-panel p-12 flex-1 flex flex-col items-center justify-center text-center relative overflow-hidden">
                                        <div className="absolute top-0 right-0 p-4 opacity-10">
                                            <svg className="w-32 h-32" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                                        </div>
                                        <div className="text-[10px] font-black text-blue-500 uppercase tracking-[0.5em] mb-4">Secret Clearance</div>
                                        <div className="bg-white/5 p-8 rounded-full mb-6">
                                            <div className="text-5xl font-black text-white font-tech">{participants.length}</div>
                                        </div>
                                        <p className="text-slate-400 font-bold">目前已收到名單總數</p>
                                    </div>

                                    <div className="glass-panel p-8 bg-gradient-to-br from-white/[0.03] to-transparent border-white/10">
                                        <div className="flex items-center gap-3 mb-6">
                                            <svg className="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                                            <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Restricted Area</span>
                                        </div>
                                        <input type="password" value={adminPassword} onChange={e => setAdminPassword(e.target.value)} placeholder="管理密鑰" className="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-center text-white outline-none focus:border-blue-600 text-sm tracking-[0.6em] mb-4" />
                                        <button onClick={handleAdminLogin} className="w-full py-4 rounded-xl bg-white/5 hover:bg-white/10 text-[10px] font-black text-slate-400 hover:text-white uppercase tracking-widest transition-all">驗證存取</button>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-8 animate-in fade-in zoom-in-95">
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
                                    <div className="lg:col-span-2 glass-panel h-[700px] flex flex-col overflow-hidden shadow-2xl border-white/10">
                                        <div className="p-10 border-b border-white/5 flex justify-between items-center bg-white/5">
                                            <h3 className="font-black text-white italic tracking-widest uppercase">實時名單庫</h3>
                                            <span className="px-4 py-1 bg-blue-600 rounded-full text-[10px] font-black text-white">{participants.length}</span>
                                        </div>
                                        <div className="flex-1 overflow-y-auto p-8 space-y-4 custom-scroll">
                                            {participants.map(p => (
                                                <div key={p.id} className="bg-white/5 p-6 rounded-3xl flex justify-between items-center border border-white/5 hover:border-blue-500/50 transition-all">
                                                    <div className="flex items-center gap-6">
                                                        <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${p.s ? 'bg-yellow-500/20 text-yellow-500' : 'bg-blue-500/10 text-blue-500'}`}>
                                                            {p.s ? '★' : '👤'}
                                                        </div>
                                                        <div>
                                                            <div className="text-white font-black text-xl tracking-tight">{p.robloxId}</div>
                                                            <div className="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-1">{p.box} • {p.s ? 'Premium' : 'Standard'}</div>
                                                        </div>
                                                    </div>
                                                    <button onClick={() => db.collection(`artifacts/${appId}/public/data/participants`).doc(p.id).delete()} className="text-slate-700 hover:text-rose-500 font-black text-xs p-2">移除</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="glass-panel p-10 flex flex-col gap-10">
                                        <div className="space-y-6">
                                            <h3 className="text-[10px] font-black text-blue-500 uppercase tracking-[0.4em] text-center">抽獎系統設定</h3>
                                            <div className="bg-black/60 p-10 rounded-[2.5rem] border border-white/5">
                                                <input type="number" value={drawCount} onChange={e => setDrawCount(parseInt(e.target.value) || 1)} className="w-full bg-transparent text-center text-white font-tech text-7xl outline-none" />
                                                <div className="text-center text-slate-600 text-[9px] font-bold uppercase mt-4 tracking-widest">Winners Count</div>
                                            </div>
                                        </div>
                                        <button onClick={() => setWinners([...participants].sort(() => 0.5 - Math.random()).slice(0, Math.min(drawCount, participants.length)))} className="w-full bg-emerald-600 py-8 rounded-[2rem] font-black text-white uppercase tracking-[0.3em] shadow-[0_0_30px_rgba(16,185,129,0.3)] active:scale-95 transition-all text-xl">開始抽取名單</button>
                                        <div className="space-y-4">
                                            {winners.map((w, i) => (
                                                <div key={i} className="bg-emerald-500/10 p-5 rounded-2xl border border-emerald-500/20 flex justify-between items-center animate-in slide-in-from-right-10" style={{animationDelay: `${i*100}ms`}}>
                                                    <span className="text-emerald-400 font-black italic">{w.robloxId}</span>
                                                    <span className="text-[9px] text-emerald-600 font-black uppercase border border-emerald-600/30 px-2 py-1 rounded-lg">Win</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                    <footer className="py-12 text-center">
                        <p className="text-[10px] font-black text-slate-800 tracking-[1em] uppercase">Hacqr Lottery Management v2.5.0</p>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
