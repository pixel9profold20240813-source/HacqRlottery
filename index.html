<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Hacqr RIVALS 抽獎系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f0c1d] text-white p-6">

    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold text-yellow-400 mb-6 text-center">Hacqr RIVALS 抽獎系統</h1>
        
        <div class="bg-[#1e1b33] p-6 rounded-xl mb-8">
            <input type="text" id="username" placeholder="輸入 Roblox ID" class="w-full p-2 mb-2 bg-[#16132b] rounded">
            <select id="box" class="w-full p-2 mb-4 bg-[#16132b] rounded">
                <option value="1">皮膚箱 1</option>
                <option value="2">皮膚箱 2</option>
                <option value="3">皮膚箱 3</option>
            </select>
            <button onclick="joinLottery()" class="w-full bg-yellow-500 py-2 rounded text-black font-bold">參加抽獎</button>
        </div>

        <div class="border-t border-gray-700 pt-6">
            <button onclick="showAdmin()" class="bg-gray-600 px-4 py-2 rounded">主持人專用</button>
            
            <div id="adminPanel" class="hidden mt-4 bg-red-900/20 p-4 rounded">
                <input type="password" id="adminPass" placeholder="輸入密碼" class="p-2 w-full mb-2 bg-black rounded">
                <button onclick="verifyAdmin()" class="bg-red-600 px-4 py-2 rounded">登入管理</button>
                
                <div id="dataView" class="hidden mt-4">
                    <button onclick="clearData()" class="bg-red-500 text-sm px-2 py-1 mb-2">清除所有資料</button>
                    <ul id="list" class="text-sm bg-black p-2 rounded"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 參加抽獎
        function joinLottery() {
            const user = document.getElementById('username').value;
            const box = document.getElementById('box').value;
            if(!user) return alert("請輸入ID");
            
            let data = JSON.parse(localStorage.getItem('participants') || '[]');
            data.push({user, box});
            localStorage.setItem('participants', JSON.stringify(data));
            alert("參加成功！");
        }

        // 主持人功能
        function showAdmin() { document.getElementById('adminPanel').classList.remove('hidden'); }
        
        function verifyAdmin() {
            if(document.getElementById('adminPass').value === 'hacqrfansvip666') {
                document.getElementById('dataView').classList.remove('hidden');
                updateList();
            } else { alert("密碼錯誤"); }
        }

        function updateList() {
            const data = JSON.parse(localStorage.getItem('participants') || '[]');
            const list = document.getElementById('list');
            list.innerHTML = data.map(i => `<li>ID: ${i.user} | 箱子: ${i.box}</li>`).join('');
        }

        function clearData() {
            if(confirm("確定清除？")) {
                localStorage.removeItem('participants');
                updateList();
            }
        }
    </script>
</body>
</html>
