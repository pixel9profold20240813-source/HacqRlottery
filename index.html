<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacqr RIVALS 抽獎系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body { 
            background: radial-gradient(circle at top, #1e1b4b 0%, #0f172a 100%);
            color: white; 
            font-family: 'Noto Sans TC', sans-serif;
            min-height: 100-vh;
        }

        /* 霓虹發光字體 */
        .glow-title {
            text-shadow: 0 0 10px rgba(250, 204, 21, 0.8), 0 0 20px rgba(250, 204, 21, 0.4);
        }

        /* 磨砂玻璃效果 */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* 發光按鈕 */
        .btn-glow-yellow {
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.3);
            transition: all 0.3s ease;
        }
        .btn-glow-yellow:hover {
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.6);
            transform: translateY(-2px);
        }

        .btn-glow-orange {
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.3);
        }
        .btn-glow-orange:hover {
            box-shadow: 0 0 25px rgba(249, 115, 22, 0.6);
        }

        /* 自定義捲軸 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .input-style {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: border 0.3s;
        }
        .input-style:focus {
            border-color: #facc15;
            outline: none;
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-black text-yellow-400 mb-2 glow-title tracking-wider">Hacqr RIVALS</h1>
            <p class="text-yellow-500/80 font-bold text-lg">7萬訂閱特別篇 - 送30個皮膚箱！</p>
        </header>

        <div class="glass-card p-8 rounded-3xl mb-10">
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2 ml-1">你的 Roblox ID / Username</label>
                    <input type="text" id="robloxId" class="w-full input-style p-4 rounded-xl text-white placeholder-gray-600" placeholder="例如：hAcKe_520">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2 ml-1">你要抽哪個皮膚箱？</label>
                    <select id="boxType" class="w-full input-style p-4 rounded-xl text-white appearance-none">
                        <option value="Skin Case 1">📦 Skin Case 1</option>
                        <option value="Skin Case 2">📦 Skin Case 2</option>
                        <option value="Skin Case 3">📦 Skin Case 3</option>
                    </select>
                </div>
                
                <button onclick="join()" class="w-full bg-yellow-400 hover:bg-yellow-300 text-black font-black py-4 rounded-xl text-xl btn-glow-yellow uppercase tracking-widest">
                    立即參加抽獎
                </button>
            </div>
        </div>

        <div class="text-center">
            <button onclick="toggleAdmin()" class="text-gray-500 hover:text-white transition-colors text-sm">
                🛡️ 主持控制面板
            </button>
        </div>

        <div id="adminArea" class="hidden mt-6 space-y-6">
            <div id="authBox" class="glass-card p-6 rounded-2xl border-red-500/30">
                <input type="password" id="adminPass" placeholder="請輸入管理密碼" class="w-full input-style p-3 rounded-lg mb-4 text-center">
                <button onclick="checkAdmin()" class="w-full bg-red-600 hover:bg-red-500 py-3 rounded-xl font-bold transition-all">解鎖後台</button>
            </div>

            <div id="adminPanel" class="hidden space-y-6">
                <div class="glass-card p-6 rounded-2xl">
                    <div class="flex justify-between items-end mb-6">
                        <h2 class="text-2xl font-bold text-white">主持控制面板</h2>
                        <span id="count" class="text-yellow-400 font-mono bg-yellow-400/10 px-3 py-1 rounded-full text-sm"></span>
                    </div>

                    <input type="text" id="search" oninput="renderList()" placeholder="搜尋玩家 ID..." class="w-full input-style p-3 rounded-xl mb-6 text-sm">

                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">中獎人數</label>
                            <input type="number" id="winnerCount" value="1" min="1" class="w-full input-style p-3 rounded-xl">
                        </div>
                        <div class="flex items-end">
                            <button onclick="drawWinners()" class="w-full bg-orange-500 hover:bg-orange-400 text-black font-black py-3 rounded-xl btn-glow-orange transition-all">
                                開始抽獎！
                            </button>
                        </div>
                    </div>

                    <button onclick="clearAll()" class="w-full bg-red-900/40 hover:bg-red-600 text-red-200 py-2 rounded-xl text-xs transition-all mb-6">
                        清空所有參加記錄 (不可復原)
                    </button>

                    <div id="winnerList" class="empty:hidden bg-green-500/10 border border-green-500/30 p-4 rounded-2xl mb-6"></div>

                    <div class="max-h-64 overflow-y-auto space-y-2 pr-2" id="participantList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'lottery_v3_data';
        function getData() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }

        function join() {
            const id = document.getElementById('robloxId').value.trim();
            const box = document.getElementById('boxType').value;
            if(!id) return alert("請輸入正確的 Roblox ID");
            
            let data = getData();
            data.push({ id, box, time: new Date().toLocaleString() });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            
            alert("✨ 報名成功！祝你中獎！");
            document.getElementById('robloxId').value = "";
            if(!document.getElementById('adminPanel').classList.contains('hidden')) renderList();
        }

        function toggleAdmin() {
            document.getElementById('adminArea').classList.toggle('hidden');
        }

        function checkAdmin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === 'hacqrfansvip666') {
                document.getElementById('authBox').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                renderList();
            } else {
                alert("密碼錯誤，請重新輸入");
            }
        }

        function renderList() {
            const data = getData();
            const searchTerm = document.getElementById('search').value.toLowerCase();
            const filtered = data.filter(p => p.id.toLowerCase().includes(searchTerm));
            
            document.getElementById('count').innerText = `目前人數：${data.length}`;
            
            const list = document.getElementById('participantList');
            list.innerHTML = filtered.map((p, i) => `
                <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl hover:bg-white/10 transition-all border border-white/5">
                    <div>
                        <span class="text-white font-bold">${p.id}</span>
                        <span class="text-gray-500 text-xs ml-2">→ ${p.box}</span>
                    </div>
                    <button onclick="remove(${i})" class="w-8 h-8 flex items-center justify-center rounded-full bg-red-500/20 text-red-500 hover:bg-red-500 hover:text-white transition-all text-xs">✕</button>
                </div>
            `).join('') || '<p class="text-center text-gray-600 py-4">尚無資料</p>';
        }

        function drawWinners() {
            const data = getData();
            let count = parseInt(document.getElementById('winnerCount').value);
            if(data.length === 0) return alert("目前沒有人參加喔！");
            if(count <= 0) count = 1;
            if(count > data.length) count = data.length;

            const shuffled = [...data].sort(() => 0.5 - Math.random());
            const winners = shuffled.slice(0, count);
            
            let html = `<h3 class="text-green-400 font-bold mb-3 flex items-center">🎉 恭喜中獎者：</h3><div class="space-y-1">`;
            winners.forEach(w => {
                html += `<div class="text-white bg-green-500/20 px-3 py-2 rounded-lg text-sm border border-green-500/20">
                            <strong>${w.id}</strong> <span class="text-gray-400 text-xs">(${w.box})</span>
                         </div>`;
            });
            html += `</div>`;
            
            const winDiv = document.getElementById('winnerList');
            winDiv.innerHTML = html;
            winDiv.scrollIntoView({ behavior: 'smooth' });
        }

        function remove(index) {
            let data = getData();
            data.splice(index, 1);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            renderList();
        }

        function clearAll() {
            if(confirm("⚠️ 注意！這將永久刪除所有參加者名單，確定嗎？")) {
                localStorage.removeItem(STORAGE_KEY);
                document.getElementById('winnerList').innerHTML = "";
                renderList();
            }
        }
    </script>
</body>
</html>
