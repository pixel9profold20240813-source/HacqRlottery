<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f0c1d; color: white; font-family: sans-serif; }
        /* 發光效果 */
        .glow-text { text-shadow: 0 0 10px #fbbf24, 0 0 20px #fbbf24; }
        .glow-btn { box-shadow: 0 0 15px rgba(251, 191, 36, 0.4); }
        .glass { background: rgba(30, 27, 51, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto mt-10">
        <h1 class="text-4xl font-bold text-yellow-400 text-center mb-1 glow-text">Hacqr RIVALS</h1>
        <p class="text-center text-yellow-600 mb-8">7萬訂閱特別篇 - 送30個皮膚箱</p>

        <div class="glass p-6 rounded-2xl mb-8">
            <input type="text" id="robloxId" class="w-full bg-black/40 p-3 rounded-lg mb-4 border border-gray-700 focus:border-yellow-500 outline-none" placeholder="Roblox ID">
            <select id="boxType" class="w-full bg-black/40 p-3 rounded-lg mb-6 border border-gray-700 text-gray-400">
                <option>Skin Case 1</option>
                <option>Skin Case 2</option>
                <option>Skin Case 3</option>
            </select>
            <button onclick="join()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-3 rounded-lg glow-btn transition-all">參 加 抽 獎</button>
        </div>

        <div class="text-center">
            <button onclick="document.getElementById('admin').classList.toggle('hidden')" class="text-gray-500 text-sm hover:text-white transition-colors">主持人登入</button>
            <div id="admin" class="hidden mt-4 glass p-4 rounded-xl">
                <input type="password" id="adminPass" placeholder="密碼" class="w-full p-2 bg-black/50 rounded mb-2 text-sm">
                <button onclick="checkAdmin()" class="bg-red-600 w-full py-2 rounded text-sm hover:bg-red-500">解鎖控制台</button>
            </div>
        </div>
    </div>

    <script>
        // ... (保持原本的 JS 邏輯不變，只負責 UI 渲染) ...
        function checkAdmin() {
            if(document.getElementById('adminPass').value === 'hacqrfansvip666') {
                alert("已進入管理模式"); // 這裡可以擴充顯示列表
            } else { alert("密碼錯誤"); }
        }
    </script>
</body>
</html>
