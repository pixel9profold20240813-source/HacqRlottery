<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox 抽獎系統 - Hacqr Lottery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020205; color: #cbd5e1; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        input[type="password"] { -webkit-text-security: disc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module" typeof="babel">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, addDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // ==========================================
        // Firebase 配置 (已自動填入你的設定)
        // ==========================================
        const firebaseConfig = {
          apiKey: "AIzaSyAdK4WJIc2aK2YUdybq9_xBiDPFSghM76Y",
          authDomain: "hacqr-lottery.firebaseapp.com",
          projectId: "hacqr-lottery",
          storageBucket: "hacqr-lottery.firebasestorage.app",
          messagingSenderId: "742307339513",
          appId: "1:742307339513:web:35a5206e8cf4034d95d628",
          measurementId: "G-JR7MK8FSFP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "roblox-draw-secure";

        const { useState, useEffect } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [participants, setParticipants] = useState([]);
            const [robloxId, setRobloxId] = useState('');
            const [memberId, setMemberId] = useState('');
            const [selectedBox, setSelectedBox] = useState('皮膚箱 1');
            const [adminPassword, setAdminPassword] = useState('');
            const [drawCount, setDrawCount] = useState(1);
            const [winners, setWinners] = useState([]);
            const [message, setMessage] = useState({ type: '', text: '' });
            const [isVerifying, setIsVerifying] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);

            useEffect(() => {
                signInAnonymously(auth).catch(console.error);
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                // 注意：確保你在 Firebase 控制台建立的路徑是 artifacts/roblox-draw-secure/public/data/participants
                const q = collection(db, "artifacts", appId, "public", "data", "participants");
                return onSnapshot(q, (snap) => {
                    setParticipants(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, (err) => {
                    console.error("Firestore 同步失敗，請檢查規則是否已發布", err);
                });
            }, [user]);

            const showStatus = (type, text) => {
                setMessage({ type, text });
                setTimeout(() => setMessage({ type: '', text: '' }), 4000);
            };

            const verifyKey = async (input, type) => {
                if (!input.trim() || !user) return false;
                try {
                    const keyRef = doc(db, "artifacts", appId, "public", "data", "vault", type, "keys", input.trim());
                    const snap = await getDoc(keyRef);
                    return snap.exists();
                } catch (e) { return false; }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!user || !robloxId.trim() || isSubmitting) return;
                setIsSubmitting(true);
                try {
                    let isVip = false;
                    if (memberId.trim()) {
                        if (await verifyKey(memberId, 'vip')) isVip = true;
                        else throw new Error("VIP 驗證失敗，請檢查代碼");
                    }
                    if (participants.some(p => p.robloxId?.toLowerCase() === robloxId.trim().toLowerCase())) throw new Error("此 ID 已經報名過囉！");

                    const col = collection(db, "artifacts", appId, "public", "data", "participants");
                    if (isVip) {
                        const batch = writeBatch(db);
                        for (let i = 0; i < 20; i++) {
                            batch.set(doc(col), { robloxId: robloxId.trim(), box: selectedBox, s: true, t: Date.now() });
                        }
                        await batch.commit();
                        showStatus('success', 'VIP 驗證成功！已獲得 20 倍抽獎權重');
                    } else {
                        await addDoc(col, { robloxId: robloxId.trim(), box: selectedBox, s: false, t: Date.now() });
                        showStatus('success', '報名成功，祝您中獎！');
                    }
                    setRobloxId(''); setMemberId('');
                } catch (err) { showStatus('error', err.message); }
                finally { setIsSubmitting(false); }
            };

            const handleAdminLogin = async () => {
                setIsVerifying(true);
                if (await verifyKey(adminPassword, 'admin')) {
                    setIsAdmin(true); setAdminPassword(''); showStatus('success', '管理員登入成功');
                } else { showStatus('error', '管理密鑰無效'); }
                setIsVerifying(false);
            };

            return (
                <div className="min-h-screen p-4 md:p-10 flex flex-col">
                    <header className="max-w-6xl mx-auto w-full flex justify-between items-center mb-12">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-white text-2xl font-black italic shadow-lg shadow-blue-900/40">H</div>
                            <div>
                                <h1 className="text-2xl font-black text-white italic tracking-tighter uppercase leading-tight">Hacqr Lottery</h1>
                                <p className="text-[9px] text-blue-500 font-bold tracking-[0.3em]">CLOUD SECURE SYSTEM</p>
                            </div>
                        </div>
                        <button onClick={() => isAdmin && setIsAdmin(false)} className="text-[10px] font-bold tracking-widest text-slate-500 hover:text-white uppercase border border-white/5 px-4 py-2 rounded-lg transition-all bg-white/5">
                            {isAdmin ? 'Logout System' : 'Admin Portal'}
                        </button>
                    </header>

                    {message.text && (
                        <div className={`fixed top-10 left-1/2 -translate-x-1/2 z-[100] px-8 py-4 rounded-2xl shadow-2xl border border-white/10 backdrop-blur-xl animate-in fade-in slide-in-from-top-10 ${message.type === 'success' ? 'bg-blue-600/90' : 'bg-rose-600/90'} text-white font-bold`}>
                            {message.text}
                        </div>
                    )}

                    <main className="max-w-6xl mx-auto w-full flex-1">
                        {!isAdmin ? (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                                <div className="lg:col-span-7 bg-white/[0.02] border border-white/5 p-8 md:p-12 rounded-[3rem] backdrop-blur-3xl">
                                    <h2 className="text-4xl font-black text-white mb-10 italic uppercase tracking-tighter">抽獎登記表單</h2>
                                    <form onSubmit={handleSubmit} className="space-y-8">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-500 uppercase ml-2 tracking-widest">Roblox Username</label>
                                            <input type="text" value={robloxId} onChange={e => setRobloxId(e.target.value)} placeholder="您的帳號名稱" className="w-full bg-black border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-blue-600 text-xl font-bold transition-all" required />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-500 uppercase ml-2 tracking-widest">VIP Code (Optional)</label>
                                            <input type="text" value={memberId} onChange={e => setMemberId(e.target.value)} placeholder="如有驗證碼請輸入" className="w-full bg-black border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-blue-600 text-xl font-bold transition-all" />
                                        </div>
                                        <div className="flex gap-4">
                                            {['皮膚箱 1', '皮膚箱 2', '皮膚箱 3'].map(box => (
                                                <button key={box} type="button" onClick={() => setSelectedBox(box)} className={`flex-1 p-6 rounded-2xl border-2 text-[10px] font-black uppercase tracking-widest transition-all ${selectedBox === box ? 'border-blue-600 bg-blue-600/20 text-white shadow-lg' : 'border-white/5 text-slate-700 hover:border-white/10'}`}>{box}</button>
                                            ))}
                                        </div>
                                        <button disabled={isSubmitting} className="w-full bg-blue-600 hover:bg-blue-500 py-7 rounded-[2rem] font-black text-white text-2xl shadow-xl shadow-blue-900/20 active:scale-95 transition-all flex justify-center items-center gap-3">
                                            {isSubmitting ? '正在安全提交...' : '立即提交報名'}
                                        </button>
                                    </form>
                                </div>
                                <div className="lg:col-span-5 flex flex-col gap-8">
                                    <div className="bg-white/[0.01] border border-white/5 p-10 rounded-[3rem] flex-1 flex flex-col items-center justify-center text-center">
                                        <div className="text-8xl font-black text-blue-900/10 mb-2 italic tracking-tighter">DATA</div>
                                        <div className="text-white font-black text-2xl mb-2">伺服器狀態：良好</div>
                                        <div className="text-slate-600 text-sm tracking-widest">當前報名總數：<span className="text-blue-500">{participants.length}</span></div>
                                    </div>
                                    {!isAdmin && (
                                        <div className="p-8 bg-white/[0.02] border border-white/5 rounded-[2.5rem]">
                                            <input type="password" value={adminPassword} onChange={e => setAdminPassword(e.target.value)} placeholder="管理密鑰" className="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-center text-white outline-none focus:border-blue-600 transition-all text-xs tracking-[0.5em]" />
                                            <button onClick={handleAdminLogin} className="w-full mt-4 text-[9px] font-black text-slate-600 hover:text-blue-500 uppercase tracking-[0.5em] transition-all">Verify Admin Key</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-8 animate-in fade-in zoom-in-95">
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
                                    <div className="lg:col-span-2 bg-white/[0.02] border border-white/5 rounded-[3rem] h-[650px] flex flex-col overflow-hidden">
                                        <div className="p-8 border-b border-white/5 font-black text-white italic tracking-widest uppercase flex justify-between items-center bg-white/[0.01]">
                                            <span>參加者實時清單</span>
                                            <span className="text-blue-500">{participants.length} 人</span>
                                        </div>
                                        <div className="flex-1 overflow-y-auto p-6 space-y-3 custom-scroll">
                                            {participants.map(p => (
                                                <div key={p.id} className="bg-black/50 p-6 rounded-2xl flex justify-between items-center border border-white/5 group hover:border-blue-500/50 transition-all">
                                                    <div>
                                                        <div className="text-white font-black text-xl">{p.robloxId} {p.s && <span className="text-yellow-500 ml-2">★ VIP</span>}</div>
                                                        <div className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">{p.box}</div>
                                                    </div>
                                                    <button onClick={() => deleteDoc(doc(db, "artifacts", appId, "public", "data", "participants", p.id))} className="text-slate-800 hover:text-rose-500 p-2 transition-all">刪除</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-white/[0.02] border border-white/5 p-10 rounded-[3rem] flex flex-col gap-8 shadow-2xl">
                                        <div className="space-y-4">
                                            <h3 className="text-xs font-black text-slate-600 uppercase tracking-widest text-center">抽選系統</h3>
                                            <div className="text-sm text-slate-400 text-center px-4">請輸入要抽選的人數</div>
                                            <input type="number" value={drawCount} onChange={e => setDrawCount(parseInt(e.target.value) || 1)} className="w-full bg-black border border-white/10 p-10 rounded-3xl text-center text-white font-mono text-6xl outline-none focus:border-blue-600 transition-all" />
                                        </div>
                                        <button onClick={() => setWinners([...participants].sort(() => 0.5 - Math.random()).slice(0, Math.min(drawCount, participants.length)))} className="w-full bg-blue-600 py-6 rounded-2xl font-black text-white uppercase tracking-[0.2em] shadow-lg active:scale-95 transition-all text-xl">開 始 抽 取</button>
                                        <div className="space-y-3">
                                            {winners.map((w, i) => (
                                                <div key={i} className="bg-emerald-500/10 p-4 rounded-xl border border-emerald-500/20 text-emerald-400 font-black italic flex justify-between">
                                                    <span>{w.robloxId}</span>
                                                    <span className="text-[10px] uppercase">{w.box}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                    <footer className="max-w-6xl mx-auto w-full py-10 text-center text-slate-800 text-[10px] font-black tracking-widest uppercase">
                        &copy; 2025 Hacqr Lottery System • Secured by Firebase
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
