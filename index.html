<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>主持控制面板</title>
    <style>
        body { background-color: #12121e; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        .container { background-color: #1e1e2f; padding: 30px; border-radius: 12px; width: 500px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: none; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; }
        .btn-orange { background-color: #ff9800; color: white; }
        .btn-red { background-color: #d32f2f; color: white; }
        #adminPanel { display: none; } /* 預設隱藏 */
        .record-item { background: #2b2b42; padding: 10px; margin: 5px 0; border-radius: 4px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginArea">
        <h2>請輸入管理密碼</h2>
        <input type="password" id="password" placeholder="輸入密碼">
        <button class="btn-orange" onclick="checkPassword()">登入</button>
    </div>

    <div id="adminPanel">
        <h2>主持控制面板</h2>
        <p>目前參加人數：9 人</p>
        <input type="text" placeholder="搜尋 Roblox ID (支援部分匹配)">
        <label>要抽出幾位贏家？</label>
        <input type="number" value="6">
        <button class="btn-orange">開始抽獎！</button>
        <button class="btn-red">全部清空參加記錄（小心！不可復原）</button>
        
        <div id="recordList">
            <div class="record-item">Channing051 → Skin Case 3 <span>❌</span></div>
            <div class="record-item">fgfgfg987654321 → Skin Case 2 <span>❌</span></div>
            <div class="record-item">scw211116 → Skin Case 2 <span>❌</span></div>
        </div>
    </div>
</div>

<script>
    function checkPassword() {
        const pass = document.getElementById('password').value;
        if (pass === "1234") {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
        } else {
            alert("密碼錯誤！");
        }
    }
</script>

</body>
</html>
