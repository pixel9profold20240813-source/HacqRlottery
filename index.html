<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacqr RIVALS 皮膚箱抽獎</title>
    <style>
        body {
            background-color: #12121e;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e2f;
            padding: 40px;
            border-radius: 12px;
            width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h1 { font-size: 24px; color: #ffab40; text-align: center; }
        .subtitle { text-align: center; margin-bottom: 20px; color: #b0b0c3; }
        label { display: block; margin: 15px 0 5px; font-size: 14px; }
        input, select {
            width: 100%;
            padding: 12px;
            background-color: #2b2b42;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            margin-top: 25px;
            background-color: #ff9800;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #e68900; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hacqr RIVALS 皮膚箱抽獎</h1>
        <p class="subtitle">7萬訂閱特別篇 - 送30個皮膚箱！</p>
        
        <form id="lotteryForm">
            <label for="username">你的 Roblox ID / Username</label>
            <input type="text" id="username" placeholder="例如：hAcKe_520" required>

            <label for="boxSelect">你要抽哪個皮膚箱？</label>
            <select id="boxSelect" required>
                <option value="">請選擇</option>
                <option value="box1">新手基礎箱</option>
                <option value="box2">傳奇限定箱</option>
            </select>

            <label for="code">會員專屬代碼（會員可刷最多20次，非會員限1次）</label>
            <input type="text" id="code" placeholder="輸入你的專屬代碼（會員限定）">

            <button type="submit">參加抽獎！</button>
        </form>
    </div>

    <script>
        document.getElementById('lotteryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("抽獎請求已送出！");
        });
    </script>
</body>
</html>
